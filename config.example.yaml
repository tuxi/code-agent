default_model: deepseek-pro

# ── Credential 来源 ────────────────────────────────────────────
# 每个 credential 条目用 namespace + name 唯一标识。
# model 通过 credential.namespace + credential.name 引用此处的条目。
#
# source:
#   injected  — 宿主（AgentKit / CLI --gateway-token）注入，不在本文件配置 secret
#   env       — 从环境变量读取
#   none      — 无需凭证（本地模型）
credentials:
  # ── Gateway ──
  gateway:
    default:
      source: injected

  # ── BYOK ──
  llm:
    deepseek:
      source: env
      env: DEEPSEEK_API_KEY
    openai:
      source: env
      env: OPENAI_API_KEY
    qwen:
      source: env
      env: DASHSCOPE_API_KEY
    glm:
      source: env
      env: GLM_API_KEY

models:
  # ── Gateway 模式 ─────────────────────────────────────────────
  # 通过 Agent Gateway 调用模型。认证由宿主注入 JWT：
  #   secretsJSON: {"gateway/default": {"type": "bearer", "secret": "eyJ..."}}
  # 模型选择在 Gateway 服务端完成（model: "" = 默认模型）。
  gateway:
    provider: openai
    base_url: "https://agent.xxx.com/api/v1/agent"
    model: ""                                       # Gateway 服务端选择
    credential:
      namespace: gateway
      name: default
    context_window: 128000

  # ── BYOK 模式 ────────────────────────────────────────────────
  # 直连模型 API。credential.namespace + credential.name 引用
  # 上方 credentials section 中的条目。
  deepseek:
    provider: openai
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
    credential:
      namespace: llm
      name: deepseek
    temperature: 0.2
    context_window: 128000
    input_price_per_million: 0.27
    output_price_per_million: 1.10
    cache_input_price_per_million: 0.027

  deepseek-pro:
    provider: openai
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"
    credential:
      namespace: llm
      name: deepseek
    context_window: 128000
    input_price_per_million: 2.0
    output_price_per_million: 8.0

  qwen:
    provider: openai
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen3-coder-plus"
    credential:
      namespace: llm
      name: qwen
    context_window: 256000
    input_price_per_million: 2.0
    output_price_per_million: 8.0

  glm:
    provider: openai
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4.7"
    credential:
      namespace: llm
      name: glm
    context_window: 128000

  # ── 本地模型（Ollama）───────────────────────────────────────
  ollama-coder:
    provider: ollama
    base_url: "http://localhost:11434"
    model: "qwen3-coder-tool"
    temperature: 0.2
    context_window: 32768

agent:
  max_steps: 48
  max_parallel_tools: 8
  compact_ratio: 0.75
  subagent_model: deepseek
  client_tool_timeout_seconds: 900

provider:
  request_timeout_seconds: 600
  max_retries: 5
  backoff_millis: 500
  max_backoff_seconds: 8

currency: "$"

web:
  search:
    # Managed mode: reuses the same gateway/default JWT as model calls.
    # Gateway owns Tavily credentials, provider fallback, billing and idempotency.
    provider: gateway
    gateway_base_url: "https://agent.xxx.com/api/v1/agent"
    credential:
      namespace: gateway
      name: default
    top_k: 5
    # Runtime -> Gateway whole-request timeout. Keep separate from the direct
    # provider timeout because Gateway also performs quota and billing writes.
    gateway_timeout_seconds: 120
  fetch:
    timeout_seconds: 30
    cache_ttl_seconds: 600

hooks:
  - event: post_tool_use
    match: edit_file
    command: gofmt -w .
  - event: pre_tool_use
    match: run_command
    command: 'if grep -q "rm -rf"; then echo "blocked: refusing rm -rf"; exit 1; fi'

runtime:
  max_concurrent_turns: 5
